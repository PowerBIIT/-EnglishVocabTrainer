version: '3.9'

services:
  db:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: vocab
      POSTGRES_PASSWORD: vocab
      POSTGRES_DB: vocab
    ports:
      - '5432:5432'
    volumes:
      - vocab_db_data:/var/lib/postgresql/data

volumes:
  vocab_db_data:
