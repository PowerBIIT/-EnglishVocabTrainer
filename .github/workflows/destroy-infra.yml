name: Destroy Azure Infrastructure

on:
  workflow_dispatch:
    inputs:
      resource_group:
        description: 'Resource group name to delete'
        required: false
        default: 'evt-rg-pl'
      confirm:
        description: 'Type "destroy" to confirm deletion'
        required: true

permissions:
  contents: read

jobs:
  destroy:
    runs-on: ubuntu-latest
    environment: prd
    if: ${{ github.event.inputs.confirm == 'destroy' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate confirmation
        env:
          CONFIRM: ${{ github.event.inputs.confirm }}
        run: |
          if [ "$CONFIRM" != "destroy" ]; then
            echo "❌ Confirmation failed. Please type 'destroy' to proceed."
            exit 1
          fi

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_PROVISION_CREDENTIALS != '' && secrets.AZURE_PROVISION_CREDENTIALS || secrets.AZURE_CREDENTIALS }}

      - name: Verify resource group exists
        id: verify
        env:
          RG: ${{ github.event.inputs.resource_group }}
        run: |
          if az group show --name "$RG" &>/dev/null; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "✅ Resource group '$RG' found"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "⚠️  Resource group '$RG' does not exist"
          fi

      - name: List resources to be deleted
        if: steps.verify.outputs.exists == 'true'
        env:
          RG: ${{ github.event.inputs.resource_group }}
        run: |
          echo "📋 Resources in '$RG' that will be deleted:"
          az resource list --resource-group "$RG" --query "[].{Name:name, Type:type}" -o table

      - name: Delete Service Principal (if exists)
        if: steps.verify.outputs.exists == 'true'
        env:
          RG: ${{ github.event.inputs.resource_group }}
        run: |
          # Find service principals scoped to this resource group
          SUBSCRIPTION_ID=$(az account show --query id -o tsv)

          # List all service principals (note: this requires Microsoft Graph permissions)
          SP_IDS=$(az ad sp list --all --query "[?contains(id, 'evt-deploy-sp')].appId" -o tsv 2>/dev/null || echo "")

          if [ -n "$SP_IDS" ]; then
            echo "🔑 Found service principals to delete:"
            for SP_ID in $SP_IDS; do
              SP_NAME=$(az ad sp show --id "$SP_ID" --query displayName -o tsv 2>/dev/null || echo "")
              if [[ "$SP_NAME" == evt-deploy-sp* ]]; then
                echo "  - Deleting $SP_NAME ($SP_ID)"
                az ad sp delete --id "$SP_ID" || echo "⚠️  Failed to delete SP $SP_ID (might not have permissions)"
              fi
            done
          else
            echo "ℹ️  No service principals found or unable to list (requires Graph permissions)"
          fi

      - name: Delete resource group
        if: steps.verify.outputs.exists == 'true'
        env:
          RG: ${{ github.event.inputs.resource_group }}
        run: |
          echo "🗑️  Deleting resource group '$RG' and all resources..."
          az group delete --name "$RG" --yes --no-wait
          echo "✅ Deletion initiated (running in background)"

      - name: Clear GitHub secrets (UAT)
        if: steps.verify.outputs.exists == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true
        run: |
          echo "🔐 Clearing UAT secrets..."
          gh secret delete AZURE_RESOURCE_GROUP -e uat 2>/dev/null || true
          gh secret delete AZURE_WEBAPP_NAME_UAT -e uat 2>/dev/null || true
          gh secret delete AZURE_CREDENTIALS -e uat 2>/dev/null || true
          gh secret delete AZURE_WEBAPP_PUBLISH_PROFILE_UAT -e uat 2>/dev/null || true
          gh secret delete DATABASE_URL -e uat 2>/dev/null || true
          gh secret delete NEXTAUTH_URL -e uat 2>/dev/null || true

      - name: Clear GitHub secrets (PRD)
        if: steps.verify.outputs.exists == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true
        run: |
          echo "🔐 Clearing PRD secrets..."
          gh secret delete AZURE_RESOURCE_GROUP -e prd 2>/dev/null || true
          gh secret delete AZURE_WEBAPP_NAME_PRD -e prd 2>/dev/null || true
          gh secret delete AZURE_CREDENTIALS -e prd 2>/dev/null || true
          gh secret delete AZURE_WEBAPP_PUBLISH_PROFILE_PRD -e prd 2>/dev/null || true
          gh secret delete DATABASE_URL -e prd 2>/dev/null || true
          gh secret delete NEXTAUTH_URL -e prd 2>/dev/null || true

      - name: Summary
        env:
          RG: ${{ github.event.inputs.resource_group }}
          EXISTS: ${{ steps.verify.outputs.exists }}
        run: |
          if [ "$EXISTS" == "true" ]; then
            echo "✅ Infrastructure destruction initiated!"
            echo ""
            echo "🗑️  Resource Group: $RG (deletion in progress)"
            echo "🔐 GitHub Secrets cleared for environments: uat, prd"
            echo ""
            echo "⚠️  Note: Azure deletion runs in background and may take a few minutes."
            echo "         Verify in Azure Portal that all resources are deleted."
          else
            echo "ℹ️  Resource group '$RG' does not exist - nothing to delete"
          fi
