name: Provision Azure Infrastructure

on:
  workflow_dispatch:
    inputs:
      location:
        description: 'Azure region'
        required: false
        default: 'polandcentral'
      resource_group:
        description: 'Resource group name'
        required: false
        default: 'evt-rg-pl'
      plan_sku:
        description: 'App Service Plan SKU (B1=low cost, S1=production)'
        required: false
        default: 'B1'
      confirm:
        description: 'Type "create" to confirm'
        required: true

permissions:
  contents: read

jobs:
  provision:
    runs-on: ubuntu-latest
    if: ${{ github.event.inputs.confirm == 'create' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate confirmation
        env:
          CONFIRM: ${{ github.event.inputs.confirm }}
        run: |
          if [ "$CONFIRM" != "create" ]; then
            echo "❌ Confirmation failed. Please type 'create' to proceed."
            exit 1
          fi

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_PROVISION_CREDENTIALS }}

      - name: Generate random suffix and password
        id: generate
        run: |
          SUFFIX=$(openssl rand -hex 2)
          PG_PASSWORD=$(openssl rand -base64 24 | tr -d "=+/" | cut -c1-20)
          echo "suffix=$SUFFIX" >> "$GITHUB_OUTPUT"
          echo "::add-mask::$PG_PASSWORD"
          echo "pg_password=$PG_PASSWORD" >> "$GITHUB_OUTPUT"

      - name: Set variables
        id: vars
        env:
          INPUT_LOCATION: ${{ github.event.inputs.location }}
          INPUT_RG: ${{ github.event.inputs.resource_group }}
        run: |
          SUFFIX="${{ steps.generate.outputs.suffix }}"

          echo "location=$INPUT_LOCATION" >> "$GITHUB_OUTPUT"
          echo "resource_group=$INPUT_RG" >> "$GITHUB_OUTPUT"
          echo "plan_name=evt-plan-pl" >> "$GITHUB_OUTPUT"
          echo "app_uat=evt-uat-pl-$SUFFIX" >> "$GITHUB_OUTPUT"
          echo "app_prd=evt-prd-pl-$SUFFIX" >> "$GITHUB_OUTPUT"
          echo "pg_server=evt-pg-pl-$SUFFIX" >> "$GITHUB_OUTPUT"
          echo "pg_admin_user=vocabadmin" >> "$GITHUB_OUTPUT"

      - name: Create resource group
        env:
          RG: ${{ steps.vars.outputs.resource_group }}
          LOCATION: ${{ steps.vars.outputs.location }}
        run: |
          az group create --name "$RG" --location "$LOCATION"

      - name: Create App Service Plan
        env:
          PLAN_NAME: ${{ steps.vars.outputs.plan_name }}
          RG: ${{ steps.vars.outputs.resource_group }}
          PLAN_SKU: ${{ github.event.inputs.plan_sku }}
        run: |
          az appservice plan create \
            --name "$PLAN_NAME" \
            --resource-group "$RG" \
            --sku "$PLAN_SKU" \
            --is-linux

      - name: Create UAT Web App
        env:
          APP_NAME: ${{ steps.vars.outputs.app_uat }}
          RG: ${{ steps.vars.outputs.resource_group }}
          PLAN_NAME: ${{ steps.vars.outputs.plan_name }}
        run: |
          az webapp create \
            --name "$APP_NAME" \
            --resource-group "$RG" \
            --plan "$PLAN_NAME" \
            --runtime "NODE|20-lts"

      - name: Create PRD Web App
        env:
          APP_NAME: ${{ steps.vars.outputs.app_prd }}
          RG: ${{ steps.vars.outputs.resource_group }}
          PLAN_NAME: ${{ steps.vars.outputs.plan_name }}
        run: |
          az webapp create \
            --name "$APP_NAME" \
            --resource-group "$RG" \
            --plan "$PLAN_NAME" \
            --runtime "NODE|20-lts"

      - name: Create PostgreSQL Flexible Server
        env:
          PG_SERVER: ${{ steps.vars.outputs.pg_server }}
          RG: ${{ steps.vars.outputs.resource_group }}
          LOCATION: ${{ steps.vars.outputs.location }}
          PG_USER: ${{ steps.vars.outputs.pg_admin_user }}
          PG_PASSWORD: ${{ steps.generate.outputs.pg_password }}
        run: |
          az postgres flexible-server create \
            --name "$PG_SERVER" \
            --resource-group "$RG" \
            --location "$LOCATION" \
            --admin-user "$PG_USER" \
            --admin-password "$PG_PASSWORD" \
            --sku-name Standard_B1ms \
            --tier Burstable \
            --storage-size 32 \
            --version 16 \
            --public-access All

      - name: Create firewall rule for Azure services
        env:
          RG: ${{ steps.vars.outputs.resource_group }}
          PG_SERVER: ${{ steps.vars.outputs.pg_server }}
        run: |
          az postgres flexible-server firewall-rule create \
            --resource-group "$RG" \
            --name "$PG_SERVER" \
            --rule-name AllowAllAzureServices \
            --start-ip-address 0.0.0.0 \
            --end-ip-address 0.0.0.0

      - name: Create UAT database
        env:
          RG: ${{ steps.vars.outputs.resource_group }}
          PG_SERVER: ${{ steps.vars.outputs.pg_server }}
        run: |
          az postgres flexible-server db create \
            --resource-group "$RG" \
            --server-name "$PG_SERVER" \
            --database-name evt_uat

      - name: Create PRD database
        env:
          RG: ${{ steps.vars.outputs.resource_group }}
          PG_SERVER: ${{ steps.vars.outputs.pg_server }}
        run: |
          az postgres flexible-server db create \
            --resource-group "$RG" \
            --server-name "$PG_SERVER" \
            --database-name evt_prd

      - name: Create Service Principal for GitHub Actions
        id: sp
        env:
          RG: ${{ steps.vars.outputs.resource_group }}
        run: |
          SUBSCRIPTION_ID=$(az account show --query id -o tsv)
          SP_NAME="evt-deploy-sp-$(date +%s)"

          SP_JSON=$(az ad sp create-for-rbac \
            --name "$SP_NAME" \
            --role contributor \
            --scopes "/subscriptions/$SUBSCRIPTION_ID/resourceGroups/$RG" \
            --sdk-auth)

          echo "::add-mask::$SP_JSON"
          echo "sp_json<<EOF" >> "$GITHUB_OUTPUT"
          echo "$SP_JSON" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Get publish profiles
        id: publish
        env:
          RG: ${{ steps.vars.outputs.resource_group }}
          APP_UAT: ${{ steps.vars.outputs.app_uat }}
          APP_PRD: ${{ steps.vars.outputs.app_prd }}
        run: |
          UAT_PROFILE=$(az webapp deployment list-publishing-profiles \
            --resource-group "$RG" \
            --name "$APP_UAT" \
            --xml)

          PRD_PROFILE=$(az webapp deployment list-publishing-profiles \
            --resource-group "$RG" \
            --name "$APP_PRD" \
            --xml)

          echo "::add-mask::$UAT_PROFILE"
          echo "::add-mask::$PRD_PROFILE"

          echo "uat_profile<<EOF" >> "$GITHUB_OUTPUT"
          echo "$UAT_PROFILE" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

          echo "prd_profile<<EOF" >> "$GITHUB_OUTPUT"
          echo "$PRD_PROFILE" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Build database URLs
        id: db_urls
        env:
          PG_SERVER: ${{ steps.vars.outputs.pg_server }}
          PG_USER: ${{ steps.vars.outputs.pg_admin_user }}
          PG_PASS: ${{ steps.generate.outputs.pg_password }}
        run: |
          PG_HOST="${PG_SERVER}.postgres.database.azure.com"

          UAT_DB_URL="postgresql://${PG_USER}:${PG_PASS}@${PG_HOST}:5432/evt_uat?sslmode=require"
          PRD_DB_URL="postgresql://${PG_USER}:${PG_PASS}@${PG_HOST}:5432/evt_prd?sslmode=require"

          echo "::add-mask::$UAT_DB_URL"
          echo "::add-mask::$PRD_DB_URL"

          echo "uat_db_url=$UAT_DB_URL" >> "$GITHUB_OUTPUT"
          echo "prd_db_url=$PRD_DB_URL" >> "$GITHUB_OUTPUT"

      - name: Set GitHub secrets for UAT
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RG: ${{ steps.vars.outputs.resource_group }}
          APP_UAT: ${{ steps.vars.outputs.app_uat }}
          SP_JSON: ${{ steps.sp.outputs.sp_json }}
          UAT_PROFILE: ${{ steps.publish.outputs.uat_profile }}
          UAT_DB_URL: ${{ steps.db_urls.outputs.uat_db_url }}
        run: |
          gh secret set AZURE_RESOURCE_GROUP -b "$RG" -e uat
          gh secret set AZURE_WEBAPP_NAME_UAT -b "$APP_UAT" -e uat
          gh secret set AZURE_CREDENTIALS -b "$SP_JSON" -e uat
          gh secret set AZURE_WEBAPP_PUBLISH_PROFILE_UAT -b "$UAT_PROFILE" -e uat
          gh secret set DATABASE_URL -b "$UAT_DB_URL" -e uat
          gh secret set NEXTAUTH_URL -b "https://${APP_UAT}.azurewebsites.net" -e uat

      - name: Set GitHub secrets for PRD
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RG: ${{ steps.vars.outputs.resource_group }}
          APP_PRD: ${{ steps.vars.outputs.app_prd }}
          SP_JSON: ${{ steps.sp.outputs.sp_json }}
          PRD_PROFILE: ${{ steps.publish.outputs.prd_profile }}
          PRD_DB_URL: ${{ steps.db_urls.outputs.prd_db_url }}
        run: |
          gh secret set AZURE_RESOURCE_GROUP -b "$RG" -e prd
          gh secret set AZURE_WEBAPP_NAME_PRD -b "$APP_PRD" -e prd
          gh secret set AZURE_CREDENTIALS -b "$SP_JSON" -e prd
          gh secret set AZURE_WEBAPP_PUBLISH_PROFILE_PRD -b "$PRD_PROFILE" -e prd
          gh secret set DATABASE_URL -b "$PRD_DB_URL" -e prd
          gh secret set NEXTAUTH_URL -b "https://${APP_PRD}.azurewebsites.net" -e prd

      - name: Summary
        env:
          RG: ${{ steps.vars.outputs.resource_group }}
          LOCATION: ${{ steps.vars.outputs.location }}
          APP_UAT: ${{ steps.vars.outputs.app_uat }}
          APP_PRD: ${{ steps.vars.outputs.app_prd }}
        run: |
          echo "✅ Infrastructure provisioned successfully!"
          echo ""
          echo "📋 Resource Details:"
          echo "  - Resource Group: $RG"
          echo "  - Location: $LOCATION"
          echo "  - UAT URL: https://${APP_UAT}.azurewebsites.net"
          echo "  - PRD URL: https://${APP_PRD}.azurewebsites.net"
          echo ""
          echo "🔐 GitHub Secrets updated for environments: uat, prd"
          echo ""
          echo "⚠️  Next steps:"
          echo "  1. Verify remaining secrets are set (NEXTAUTH_SECRET, GOOGLE_*, GEMINI_API_KEY, etc.)"
          echo "  2. Push to main branch to trigger UAT deployment"
          echo "  3. Run 'Deploy PRD' workflow for production deployment"
