name: Deploy UAT

on:
  push:
    branches:
      - main
    paths-ignore:
      - '**/*.md'
      - 'docs/**'
      - 'README.md'
      - '.env.example'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: uat
  cancel-in-progress: true

env:
  NODE_VERSION: '20.x'

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: uat
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Unit tests
        run: npm run test:unit

      - name: Build
        run: npm run build

      - name: Build version info
        id: build_info
        run: |
          app_version=$(node -p "require('./package.json').version")
          echo "app_version=$app_version" >> "$GITHUB_OUTPUT"
          echo "app_commit=$(git rev-parse --short=12 HEAD)" >> "$GITHUB_OUTPUT"
          echo "app_build_time=$(date -u +'%Y-%m-%dT%H:%M:%SZ')" >> "$GITHUB_OUTPUT"

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Reset UAT database
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: npx prisma migrate reset --force --skip-seed

      - name: Configure app settings
        uses: azure/CLI@v2
        with:
          inlineScript: |
            az webapp config appsettings set \
              --resource-group "${{ secrets.AZURE_RESOURCE_GROUP }}" \
              --name "${{ secrets.AZURE_WEBAPP_NAME_UAT }}" \
              --settings \
                NODE_ENV=production \
                WEBSITE_RUN_FROM_PACKAGE=1 \
                WEBSITE_NODE_DEFAULT_VERSION=20 \
                APP_VERSION="${{ steps.build_info.outputs.app_version }}" \
                APP_COMMIT_SHA="${{ steps.build_info.outputs.app_commit }}" \
                APP_BUILD_TIME="${{ steps.build_info.outputs.app_build_time }}" \
                NEXTAUTH_URL="${{ secrets.NEXTAUTH_URL }}" \
                NEXTAUTH_SECRET="${{ secrets.NEXTAUTH_SECRET }}" \
                GOOGLE_CLIENT_ID="${{ secrets.GOOGLE_CLIENT_ID }}" \
                GOOGLE_CLIENT_SECRET="${{ secrets.GOOGLE_CLIENT_SECRET }}" \
                GEMINI_API_KEY="${{ secrets.GEMINI_API_KEY }}" \
                DATABASE_URL="${{ secrets.DATABASE_URL }}" \
                ALLOWLIST_EMAILS="${{ secrets.ALLOWLIST_EMAILS }}" \
                ADMIN_EMAILS="${{ secrets.ADMIN_EMAILS }}" \
                MAX_ACTIVE_USERS="${{ secrets.MAX_ACTIVE_USERS }}" \
                FREE_AI_REQUESTS_PER_MONTH="${{ secrets.FREE_AI_REQUESTS_PER_MONTH }}" \
                FREE_AI_UNITS_PER_MONTH="${{ secrets.FREE_AI_UNITS_PER_MONTH }}" \
                PRO_AI_REQUESTS_PER_MONTH="${{ secrets.PRO_AI_REQUESTS_PER_MONTH }}" \
                PRO_AI_UNITS_PER_MONTH="${{ secrets.PRO_AI_UNITS_PER_MONTH }}" \
                GLOBAL_AI_REQUESTS_PER_MONTH="${{ secrets.GLOBAL_AI_REQUESTS_PER_MONTH }}" \
                GLOBAL_AI_UNITS_PER_MONTH="${{ secrets.GLOBAL_AI_UNITS_PER_MONTH }}" \
                STRIPE_SECRET_KEY="${{ secrets.STRIPE_SECRET_KEY }}" \
                STRIPE_WEBHOOK_SECRET="${{ secrets.STRIPE_WEBHOOK_SECRET }}" \
                NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY="${{ secrets.NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY }}" \
                STRIPE_PRO_MONTHLY_PRICE_ID="${{ secrets.STRIPE_PRO_MONTHLY_PRICE_ID }}" \
                STRIPE_PRO_ANNUAL_PRICE_ID="${{ secrets.STRIPE_PRO_ANNUAL_PRICE_ID }}" \
                E2E_TEST=false \
                NEXT_PUBLIC_E2E_TEST=false

      - name: Configure startup command
        uses: azure/CLI@v2
        with:
          inlineScript: |
            az webapp config set \
              --resource-group "${{ secrets.AZURE_RESOURCE_GROUP }}" \
              --name "${{ secrets.AZURE_WEBAPP_NAME_UAT }}" \
              --startup-file "npm start"

      - name: Prune dev dependencies
        run: npm prune --omit=dev

      - name: Prepare deployment package
        run: |
          mkdir -p .deploy
          cp package.json package-lock.json next.config.js .deploy/
          if [ -d public ]; then cp -R public .deploy/; fi
          cp -R .next .deploy/
          cp -R node_modules .deploy/
          if [ -d prisma ]; then cp -R prisma .deploy/; fi
          if [ -d scripts ]; then cp -R scripts .deploy/; fi

      - name: Create deployment zip
        run: |
          cd .deploy
          zip -r ../deploy.zip .
          cd ..

      - name: Wait for SCM to stabilize
        run: sleep 30

      - name: Deploy to Azure Web App (UAT)
        uses: azure/CLI@v2
        with:
          inlineScript: |
            set -euo pipefail
            for attempt in 1 2 3; do
              if az webapp deploy \
                --resource-group "${{ secrets.AZURE_RESOURCE_GROUP }}" \
                --name "${{ secrets.AZURE_WEBAPP_NAME_UAT }}" \
                --src-path deploy.zip \
                --type zip \
                --track-status false; then
                exit 0
              fi
              echo "Deploy attempt ${attempt} failed; retrying in 20s..." >&2
              sleep 20
            done
            echo "Deploy failed after retries." >&2
            exit 1

      - name: Restart app (apply settings)
        uses: azure/CLI@v2
        with:
          inlineScript: |
            az webapp restart \
              --resource-group "${{ secrets.AZURE_RESOURCE_GROUP }}" \
              --name "${{ secrets.AZURE_WEBAPP_NAME_UAT }}"

      - name: Verify deployment health
        env:
          HEALTH_URL: ${{ secrets.NEXTAUTH_URL }}
          EXPECT_VERSION: ${{ steps.build_info.outputs.app_version }}
          EXPECT_COMMIT: ${{ steps.build_info.outputs.app_commit }}
        run: |
          HEALTH_URL="${HEALTH_URL%/}"
          response=""
          for i in {1..18}; do
            response=$(curl -sSf "${HEALTH_URL}/api/health" || true)
            if [ -n "$response" ]; then
              if echo "$response" | node -e '
                const fs = require("fs");
                const data = JSON.parse(fs.readFileSync(0, "utf8"));
                if (data.status !== "ok") process.exit(1);
                if (data.version !== process.env.EXPECT_VERSION) process.exit(1);
                if (data.commit !== process.env.EXPECT_COMMIT) process.exit(1);
              '; then
                echo "$response"
                exit 0
              fi
            fi
            sleep 10
          done
          echo "$response"
          echo "Health check failed after retries."
          exit 1

  e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    needs: deploy
    environment: uat
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Wait for app to stabilize
        run: sleep 30

      - name: Run E2E Tests
        env:
          BASE_URL: ${{ secrets.NEXTAUTH_URL }}
          E2E_TEST: 'true'
        run: npm run test:e2e -- --project=chromium

      - name: Upload Playwright report on failure
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
